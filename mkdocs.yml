site_name: Codesign for Cruise Control
site_description: Hierarchical implementation guide for autonomous-EV hardware-controller co-design
site_url: https://odetojsmith.github.io/Codesign-for-Cruise-Control/
repo_url: https://github.com/odetojsmith/Codesign-for-Cruise-Control
repo_name: odetojsmith/Codesign-for-Cruise-Control
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Start Here:
      - End-to-end project logic: guide/project-logic.md
      - Evidence and conclusions: guide/evidence-summary.md
      - Prioritized next steps: guide/next-steps.md
  - System:
      - System overview: architecture/system-overview.md
      - Data flow: architecture/data-flow.md
      - Hardware design: models/hardware.md
      - EV energy model: models/energy.md
      - MetaDrive integration: simulation/metadrive.md
  - Control:
      - Controller interfaces: control/interfaces.md
      - PID controllers: control/pid.md
      - Lateral–longitudinal coordination: control/coordination.md
      - Longitudinal MPC: control/mpc.md
  - Evidence:
      - Validation overview: validation/evidence.md
      - Actuator validation: validation/actuator-validation.md
      - Braking validation: validation/braking.md
      - Scenarios and metrics: experiments/scenarios.md
      - MPC weight sampling: optimization/mpc-tuning.md
      - Hardware sensitivity: optimization/hardware-sensitivity.md
      - Conventional separate design: optimization/separate-design.md
      - Integrated co-design method: optimization/codesign.md
      - Mountain shuttle: optimization/mountain-shuttle.md
      - Train/test generalization: optimization/generality-dataset.md
      - Matched-RMSE test: optimization/matched-rmse-test.md
  - Reproduce and Reference:
      - Reproducibility: experiments/reproducibility.md
      - Configuration: reference/configuration.md
      - File inventory: reference/files.md
      - Traceability: reference/traceability.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - javascripts/mermaid.js

extra:
  status:
    implemented: Implemented
    pending: Pending
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/odetojsmith/Codesign-for-Cruise-Control

copyright: Codesign for Cruise Control — implementation documentation

strict: true
